<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aprendiendo Jugando</title>

<style>

body{
font-family: Arial;
background: linear-gradient(#87CEFA,#ffffff);
text-align:center;
margin:0;
padding:0;
overflow:hidden;
}

h1{
font-size:50px;
margin-top:30px;
}

button{
font-size:40px;
padding:20px;
margin:20px;
border-radius:20px;
border:none;
cursor:pointer;
}

.opciones button{
width:200px;
height:120px;
font-size:60px;
}

.menu button{
width:300px;
}

input{
font-size:30px;
padding:10px;
border-radius:10px;
border:none;
}

#game{display:none;}
#nombreScreen{display:none;}

/* pantalla dorada */

#celebracion{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(#FFD700,#FFF4B5);
z-index:999;
align-items:center;
justify-content:center;
flex-direction:column;
}

#celebracion h2{
font-size:70px;
color:#8B7500;
}

#continuarBtn{
font-size:40px;
padding:20px 40px;
}

/* estrellas */

.estrella{
position:absolute;
font-size:35px;
animation:caer linear forwards;
}

/* pokebolas */

.pokemon{
position:absolute;
font-size:40px;
animation:caer linear forwards;
}

@keyframes caer{
0%{
transform:translateY(-50px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<h1>Aprendiendo Jugando</h1>

<div id="menu" class="menu">

<h2>¿Qué quieres aprender hoy?</h2>

<button onclick="seleccionarModo('numeros')">🔢 Números</button>
<button onclick="seleccionarModo('letras')">🔤 Letras</button>

</div>

<div id="nombreScreen">

<h2>¿Cómo te llamas?</h2>

<input id="nombreInput" placeholder="Tu nombre">

<br><br>

<button onclick="iniciarJuego()">Comenzar</button>

</div>

<div id="game">

<h2 id="tituloJuego"></h2>

<h3>Escucha y toca la respuesta correcta</h3>

<br>

<div class="opciones">
<button onclick="respuesta(this)"></button>
<button onclick="respuesta(this)"></button>
<button onclick="respuesta(this)"></button>
</div>

<br>

<button onclick="repetir()">🔊 Repetir</button>

</div>

<div id="celebracion">

<h2 id="mensajeCelebracion"></h2>

<button id="continuarBtn" onclick="continuarJuego()">Continuar</button>

</div>

<script>

let modo=""
let nombre=""
let respuestaCorrecta=""
let nivel=1
let aciertos=0

const letras="ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("")

function hablar(texto){
let msg=new SpeechSynthesisUtterance(texto)
msg.lang="es-ES"
speechSynthesis.cancel()
speechSynthesis.speak(msg)
}

/* sonidos */

const audioCtx=new (window.AudioContext||window.webkitAudioContext)()

function sonidoAcierto(){

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.type="sine"
osc.frequency.setValueAtTime(600,audioCtx.currentTime)
osc.frequency.exponentialRampToValueAtTime(1200,audioCtx.currentTime+0.25)

gain.gain.value=0.3

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.start()
osc.stop(audioCtx.currentTime+0.25)

}

function sonidoError(){

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.type="square"
osc.frequency.value=200
gain.gain.value=0.3

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.start()
osc.stop(audioCtx.currentTime+0.3)

}

/* menu */

function seleccionarModo(m){

modo=m

document.getElementById("menu").style.display="none"
document.getElementById("nombreScreen").style.display="block"

}

function iniciarJuego(){

nombre=document.getElementById("nombreInput").value

if(nombre==""){
nombre="amigo"
}

document.getElementById("nombreScreen").style.display="none"
document.getElementById("game").style.display="block"

if(modo=="numeros"){
document.getElementById("tituloJuego").innerText="Conociendo los números"
}else{
document.getElementById("tituloJuego").innerText="Conociendo las letras"
}

siguientePregunta()

}

/* juego */

function numeroAleatorio(max){
return Math.floor(Math.random()*max)+1
}

function siguientePregunta(){

let opciones=[]

if(modo=="numeros"){

let limite=Math.min(10+nivel,30)

respuestaCorrecta=numeroAleatorio(limite)

opciones.push(respuestaCorrecta)

while(opciones.length<3){

let n=numeroAleatorio(limite)

if(!opciones.includes(n)){
opciones.push(n)
}

}

}else{

let limite=Math.min(5+nivel,letras.length)

respuestaCorrecta=letras[Math.floor(Math.random()*limite)]

opciones.push(respuestaCorrecta)

while(opciones.length<3){

let l=letras[Math.floor(Math.random()*limite)]

if(!opciones.includes(l)){
opciones.push(l)
}

}

}

opciones.sort(()=>Math.random()-0.5)

let botones=document.querySelectorAll(".opciones button")

botones.forEach((b,i)=>{
b.innerText=opciones[i]
})

setTimeout(()=>{
hablar(respuestaCorrecta)
},500)

}

function respuesta(btn){

let valor=btn.innerText

if(valor==respuestaCorrecta){

aciertos++
nivel++

if(aciertos%5===0){

mostrarCelebracion()

}else{

sonidoAcierto()

setTimeout(()=>{
siguientePregunta()
},800)

}

}else{

sonidoError()

}

}

function repetir(){
hablar(respuestaCorrecta)
}

/* celebracion */

function mostrarCelebracion(){

document.getElementById("celebracion").style.display="flex"

document.getElementById("mensajeCelebracion").innerText="¡Felicitaciones "+nombre+"!"

hablar("Felicitaciones "+nombre)

lluviaEstrellas()
lluviaPokemon()

}

function continuarJuego(){

document.getElementById("celebracion").style.display="none"

siguientePregunta()

}

/* estrellas */

function lluviaEstrellas(){

for(let i=0;i<30;i++){

let estrella=document.createElement("div")

estrella.className="estrella"

estrella.innerText="⭐"

estrella.style.left=Math.random()*100+"vw"

estrella.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(estrella)

setTimeout(()=>{estrella.remove()},5000)

}

}

/* pokebolas */

function lluviaPokemon(){

for(let i=0;i<25;i++){

let poke=document.createElement("div")

poke.className="pokemon"

poke.innerText="⚪🔴"

poke.style.left=Math.random()*100+"vw"

poke.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(poke)

setTimeout(()=>{poke.remove()},5000)

}

}

</script>

</body>
</html>
